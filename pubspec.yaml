name: cv2career
description: CV2Career - AI-Powered Resume Intelligence and Career Compass System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.0.0

  # Backend - Supabase
  supabase_flutter: ^2.5.0

  # PDF parsing
  syncfusion_flutter_pdf: ^33.0.0

  # DOC/DOCX parsing
  docx_to_text: ^1.0.1

  archive: ^3.6.1 #Zip/DOCX unpacker

  # File picking
  file_picker: ^10.0.0

  # Fonts
  google_fonts: ^8.0.0

  # UI utilities
  flutter_animate: ^4.5.0
  fl_chart: ^1.0.0
  percent_indicator: ^4.2.3
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  font_awesome_flutter: ^11.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  connectivity_plus: ^7.0.0
  http: ^1.2.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env